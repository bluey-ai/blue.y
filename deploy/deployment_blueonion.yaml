# BlueOnion Production — BLUE.Y Deployment Overlay
#
# This file is NOT committed to the community blue.y repo.
# It lives in blueonion-infrastructure/k8s/blue-y/ (private).
#
# Usage:
#   kubectl apply -f deployment_blueonion.yaml
#
# Before applying, ensure blue-y-secrets exists:
#   kubectl create secret generic blue-y-secrets -n prod \
#     --from-literal=deepseek-api-key=... \
#     --from-literal=telegram-bot-token=... \
#     --from-literal=telegram-chat-id=... \
#     --from-literal=telegram-admin-id=... \
#     --from-literal=jira-email=... \
#     --from-literal=jira-api-token=... \
#     --from-literal=vision-api-key=... \
#     --from-literal=db-readonly-password=... \
#     --from-literal=bitbucket-token=... \
#     --from-literal=grafana-admin-password=... \
#     --from-literal=slack-app-token=... \
#     --from-literal=slack-bot-token=... \
#     --dry-run=client -o yaml | kubectl apply -f -
#
---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: prod
  name: blue-y
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::716156543026:role/BlueYBedrockRole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blue-y-readonly
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "services", "secrets", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["patch", "update"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blue-y-readonly-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blue-y-readonly
subjects:
  - kind: ServiceAccount
    name: blue-y
    namespace: prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: prod
  name: blue-y-production
  labels:
    app: "blue-y"
    version: "production"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "blue-y"
      version: "production"
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: "blue-y"
        version: "production"
    spec:
      serviceAccountName: blue-y
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      containers:
        - image: <ECR>:<tag>-<HASH>
          name: blue-y
          imagePullPolicy: Always
          env:
            # ── Core ──────────────────────────────────────────────────────────
            - name: PORT
              value: "8000"
            - name: CLUSTER_NAME
              value: "blo-cluster"
            - name: AWS_REGION
              value: "ap-southeast-1"

            # ── AI (DeepSeek) ────────────────────────────────────────────────
            - name: AI_BASE_URL
              value: "https://api.deepseek.com/v1"
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: deepseek-api-key
            - name: AI_ROUTINE_MODEL
              value: "deepseek-chat"
            - name: AI_INCIDENT_MODEL
              value: "deepseek-reasoner"
            - name: AI_MAX_TOKENS
              value: "2048"

            # ── Cluster-specific AI knowledge (injected into system prompt) ──
            - name: AI_SYSTEM_CONTEXT
              value: |
                === CLUSTER: blo-cluster (ap-southeast-1) ===
                EKS 1.34, namespaces: prod, doris, monitoring, wordpress

                === NAMESPACES ===
                prod       — backend, frontend, user-mgmt, pdf, blue-y
                doris      — Apache Doris analytics database (FE + BE pods, 1000Gi PVC — NEVER delete)
                monitoring — Prometheus, Grafana, Loki, Promtail
                wordpress  — www.blueonion.today (prod + UAT)

                === KEY DEPLOYMENTS (prod namespace) ===
                jcp-blo-backend-hubs20-production
                  4 JVMs: Nacos (8848), System (7001), BlueOnion (7002), Gateway (9999)
                  18GB RAM, 3-6 CPU. Start: start.sh (120s init, Lucene rebuild at 7002)
                  Java 8, Spring Boot 2.6.14, MyBatis Plus. Build: mvn -Pproductionhubs20
                  Datasources: master/dwd → hubsprod RDS, doris → Doris 9030, trino → Trino 8889
                  Known issue: Lucene index is in-memory — wiped on restart, auto-rebuilt.

                jcp-blo-frontend-fund-update-production
                  Next.js 12, React 17. Branch: production-fund-update. Port 3000.
                  URL: https://hubs.blueonion.today

                user-management-be-production
                  NestJS 8, TypeORM. Port 3000. Auth: JWT (shared secret with backend).
                  URL: https://api-users.blueonion.today

                user-management-fe-production
                  React 17, Redux. Port 8000. URL: https://users.blueonion.today

                pdf-service-production
                  Node 20, Puppeteer 22. Port 8333. URL: https://hubspdf.blueonion.today
                  Writes PDFs to S3 bucket blo-pdf-new.

                === PRODUCTION URLs ===
                https://hubs.blueonion.today         — Main Hubs frontend
                https://api-hubs.blueonion.today     — Backend API gateway (port 9999)
                https://users.blueonion.today        — User management frontend
                https://api-users.blueonion.today    — User management API
                https://hubspdf.blueonion.today      — PDF service
                https://grafana.blueonion.today      — Grafana monitoring
                https://www.blueonion.today          — WordPress marketing site

                === DATABASES ===
                hubsprod RDS (r8g.large, 3TB, MySQL 8.0) — ap-southeast-1
                  Databases: jeecg-boot (system), dwd (business data)
                  User: admin. Read-only: bluey_readonly

                bo-prod-sg RDS (t4g.small, 20GB, MySQL 8.0)
                  Databases: blo_user (User Mgmt), blo_05072022

                blueonion RDS (t4g.micro, 20GB, MariaDB 10.6)
                  Databases: prod_blueonion (WordPress), stg_blueonion, blo_user

                Doris (on EKS, doris namespace)
                  Apache Doris 2.1.7. FE port 8030, BE port 9060, MySQL port 9030.
                  151 tables, ~90GB. PVC: 1000Gi — NEVER DELETE OR MODIFY.
                  Known issue: BE OOM after nightly 2AM backup → auto-restart via CronJob.

                Trino (on EKS, prod namespace)
                  trinodb/trino:470. Internal NLB port 8889.
                  DNS: trino.blueonion.today. 4 catalogs: myods, mydwd, myprod, doris.

                === COMMON ISSUES & FIXES ===
                1. Backend OOMKilled → check heap usage; likely nightly Doris sync at 2AM
                2. Lucene index 404 → pod restarted; wait 120s or POST to /lucene/createIndex01
                3. Doris BE unresponsive after 9AM → auto-restart CronJob should handle; check pod logs
                4. Data missing → check old jcp-dev account RDS first (VPC peering active)
                5. Frontend broken → check if correct branch deployed (hubs=production-fund-update)

                === MONITORING ===
                Grafana: https://grafana.blueonion.today
                Loki: http://loki.monitoring.svc.cluster.local:3100
                WAF: bluecomm-production-waf (REGIONAL, 11 rules)

            # ── Kubernetes ────────────────────────────────────────────────────
            - name: WATCH_NAMESPACES
              value: "prod,doris,monitoring,wordpress"
            - name: KUBE_IN_CLUSTER
              value: "true"

            # ── Telegram ─────────────────────────────────────────────────────
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: telegram-bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: telegram-chat-id
            - name: TELEGRAM_ADMIN_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: telegram-admin-id
                  optional: true

            # ── Jira ─────────────────────────────────────────────────────────
            - name: JIRA_BASE_URL
              value: "https://blueonion.atlassian.net"
            - name: JIRA_PROJECT_KEY
              value: "HUBS"
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: jira-email
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: jira-api-token

            # ── Vision AI ─────────────────────────────────────────────────────
            - name: VISION_API_BASE_URL
              value: "https://generativelanguage.googleapis.com/v1beta/openai"
            - name: VISION_MODEL
              value: "gemini-2.0-flash"
            - name: VISION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: vision-api-key
                  optional: true
            - name: AI_VISION_CONTEXT
              value: |
                BlueOnion ESG platform services:
                hubs.blueonion.today — main Hubs investment portal
                api-hubs.blueonion.today — backend API
                users.blueonion.today — user management
                api-users.blueonion.today — user management API
                hubspdf.blueonion.today — PDF report generation
                grafana.blueonion.today — monitoring dashboards
                www.blueonion.today — WordPress marketing site

            # ── Email ────────────────────────────────────────────────────────
            - name: EMAIL_FROM
              value: "noreply@blueonion.today"

            # ── Loki ─────────────────────────────────────────────────────────
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"

            # ── Database (read-only) ──────────────────────────────────────────
            - name: DB_READONLY_USER
              value: "bluey_readonly"
            - name: DB_READONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: db-readonly-password
            - name: DATABASE_REGISTRY
              value: '[{"name":"hubsprod","host":"hubsprod.cjwo2em4gzz8.ap-southeast-1.rds.amazonaws.com","port":3306,"databases":["jeecg-boot","dwd"],"description":"Main business DB"},{"name":"bo-prod-sg","host":"bo-prod-sg.cjwo2em4gzz8.ap-southeast-1.rds.amazonaws.com","port":3306,"databases":["blo_user","blo_05072022"],"description":"User management DB"},{"name":"blueonion","host":"blueonion.cjwo2em4gzz8.ap-southeast-1.rds.amazonaws.com","port":3306,"databases":["prod_blueonion","stg_blueonion","blo_user"],"description":"WordPress + legacy DB"}]'

            # ── Grafana ───────────────────────────────────────────────────────
            - name: GRAFANA_INTERNAL_URL
              value: "http://grafana.monitoring.svc.cluster.local:3000"
            - name: GRAFANA_EXTERNAL_URL
              value: "https://grafana.blueonion.today"
            - name: GRAFANA_ADMIN_USER
              value: "admin"
            - name: GRAFANA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: grafana-admin-password
                  optional: true

            # ── Bitbucket ─────────────────────────────────────────────────────
            - name: BB_WORKSPACE
              value: "blueonion"
            - name: BB_USER
              value: "blueonion-pipeline"
            - name: BB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: bitbucket-token
                  optional: true
            - name: BB_PIPELINES
              value: '{"backend":{"repo":"jcp-blo-backend","branches":{"hubs":"production-hubs20","production":"production-hubs20"}},"frontend":{"repo":"jcp-blo-frontend","branches":{"hubs":"production-fund-update","bas":"basprod-frontend","bloconnect":"production-fund-bloconnect"}},"user-mgmt":{"repo":"user-management-be","branches":{"main":"feature/aws-account-migration"}},"user-fe":{"repo":"user-management-fe","branches":{"main":"feature/aws-account-migration"}},"pdf":{"repo":"pdf-service","branches":{"main":"feature/aws-account-migration"}},"bluey":{"repo":"blue.y","branches":{"main":"main"}}}'

            # ── Production URLs (for /qa smoke tests) ────────────────────────
            - name: PRODUCTION_URLS
              value: '[{"name":"Hubs Frontend","url":"https://hubs.blueonion.today","expect":200},{"name":"Backend API","url":"https://api-hubs.blueonion.today/sys/health/info","expect":200},{"name":"User Mgmt API","url":"https://api-users.blueonion.today/health","expect":200},{"name":"User Mgmt UI","url":"https://users.blueonion.today","expect":200},{"name":"PDF Service","url":"https://hubspdf.blueonion.today/health","expect":200},{"name":"WordPress","url":"https://www.blueonion.today","expect":200},{"name":"Grafana","url":"https://grafana.blueonion.today","expect":200}]'

            # ── Ping service map (for user-facing /ping command) ──────────────
            - name: PING_SERVICE_MAP
              value: '{"hubs":{"label":"Hubs","url":"https://hubs.blueonion.today"},"api":{"label":"Backend API","url":"https://api-hubs.blueonion.today/sys/health/info"},"users":{"label":"User Management","url":"https://users.blueonion.today"},"pdf":{"label":"PDF Service","url":"https://hubspdf.blueonion.today/health"},"grafana":{"label":"Grafana","url":"https://grafana.blueonion.today"},"website":{"label":"Website","url":"https://www.blueonion.today"}}'

            # ── Team email aliases (for /email <name> shorthand) ──────────────
            - name: TEAM_EMAILS
              value: '{"ops":"ops@blueonion.today","dev":"dev@blueonion.today","support":"support@blueonion.today"}'

            # ── Load monitor watch list ───────────────────────────────────────
            - name: LOAD_WATCH_LIST
              value: '[{"deployment":"jcp-blo-backend-hubs20-production","namespace":"prod","label":"Backend"},{"deployment":"jcp-blo-frontend-fund-update-production","namespace":"prod","label":"Frontend"},{"deployment":"user-management-be-production","namespace":"prod","label":"User Mgmt API"},{"deployment":"pdf-service-production","namespace":"prod","label":"PDF Service"}]'

            # ── Backend-specific pod access ───────────────────────────────────
            - name: BACKEND_POD_SEARCH
              value: "jcp-blo-backend"
            - name: BACKEND_HEALTH_ENDPOINTS
              value: '[{"name":"System","port":7001,"path":"/sys/health/info"},{"name":"BlueOnion","port":7002,"path":"/sys/health/info"},{"name":"Gateway","port":9999,"path":"/sys/health/info"},{"name":"Nacos","port":8848,"path":"/nacos/actuator/health"}]'
            - name: LUCENE_CHECK_URL
              value: "http://localhost:7002/sys/lucene/checkIndex"

            # ── WAF ───────────────────────────────────────────────────────────
            - name: WAF_WEB_ACL_NAME
              value: "bluecomm-production-waf"
            - name: WAF_SCOPE
              value: "REGIONAL"
            - name: WAF_REGION
              value: "ap-southeast-1"
            - name: WAF_IP_SET_NAME
              value: "blocked-ips"
            - name: WAF_AUTO_BLOCK_DURATION
              value: "1440"

            # ── Slack ─────────────────────────────────────────────────────────
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: slack-app-token
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: slack-bot-token
                  optional: true

            # ── MS Teams ─────────────────────────────────────────────────────
            - name: TEAMS_APP_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: teams-app-id
                  optional: true
            - name: TEAMS_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: teams-app-password
                  optional: true
            - name: TEAMS_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: teams-tenant-id
                  optional: true

            # ── Schedules ────────────────────────────────────────────────────
            - name: SCHEDULE_DAILY_REPORT
              value: "0 9 * * *"

            # ── Safety ───────────────────────────────────────────────────────
            - name: MAX_ACTIONS_PER_HOUR
              value: "5"
            - name: PASSWORD_PREFIX
              value: "Bl0"

            # ── AWS Console URL ───────────────────────────────────────────────
            - name: AWS_CONSOLE_URL
              value: "https://716156543026.signin.aws.amazon.com/console"

          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  namespace: prod
  name: blue-y-production
spec:
  type: ClusterIP
  selector:
    app: "blue-y"
    version: "production"
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
