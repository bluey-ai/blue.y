apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: <namespace>
  name: blue-y
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/BlueYBedrockRole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blue-y-readonly
rules:
  # Read-only access to pods, nodes, services, deployments, secrets (TLS only via code filter)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "services", "secrets", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Allow restart and scale (patch deployments + scale subresource)
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["patch", "update"]
  # HPA monitoring
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # Pod metrics (CPU/memory usage via metrics-server)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blue-y-readonly-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blue-y-readonly
subjects:
  - kind: ServiceAccount
    name: blue-y
    namespace: <namespace>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: <namespace>
  name: blue-y-<tag>
  labels:
    app: "blue-y"
    version: "<tag>"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "blue-y"
      version: "<tag>"
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: "blue-y"
        version: "<tag>"
    spec:
      serviceAccountName: blue-y
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      containers:
        - image: <ECR>:<tag>-<HASH>
          name: blue-y
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "8000"
            - name: AI_BASE_URL
              value: "https://api.deepseek.com/v1"
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: deepseek-api-key
            - name: AI_ROUTINE_MODEL
              value: "deepseek-chat"
            - name: AI_INCIDENT_MODEL
              value: "deepseek-reasoner"
            - name: WATCH_NAMESPACES
              value: "<WATCH_NAMESPACES>"
            - name: KUBE_IN_CLUSTER
              value: "true"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: telegram-bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: telegram-chat-id
            - name: TEAMS_APP_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: teams-app-id
                  optional: true
            - name: TEAMS_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: teams-app-password
                  optional: true
            - name: TEAMS_TENANT_ID
              value: "<TEAMS_TENANT_ID>"   # Set TEAMS_TENANT_ID as a Bitbucket repo variable
            - name: JIRA_BASE_URL
              value: "https://your-org.atlassian.net"
            - name: JIRA_PROJECT_KEY
              value: "OPS"
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: jira-email
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: jira-api-token
            - name: VISION_API_BASE_URL
              value: "https://generativelanguage.googleapis.com/v1beta/openai"
            - name: VISION_MODEL
              value: "gemini-2.0-flash"
            - name: VISION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: vision-api-key
                  optional: true
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: DB_READONLY_USER
              value: "bluey_readonly"
            - name: DB_READONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: db-readonly-password
            - name: BB_USER
              value: ""   # Your Bitbucket username (for pipeline triggers)
            - name: BB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: bitbucket-token
                  optional: true
            - name: GRAFANA_INTERNAL_URL
              value: "http://grafana.monitoring.svc.cluster.local:3000"
            - name: GRAFANA_ADMIN_USER
              value: "admin"
            - name: GRAFANA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: grafana-admin-password
                  optional: true
            - name: SCHEDULE_DAILY_REPORT
              value: "0 9 * * *"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  namespace: <namespace>
  name: blue-y-<tag>
spec:
  type: ClusterIP
  selector:
    app: "blue-y"
    version: "<tag>"
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
