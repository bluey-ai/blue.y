apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: <namespace>
  name: blue-y
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/BlueYBedrockRole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blue-y-readonly
rules:
  # Read-only access to pods, nodes, services, deployments, secrets (TLS only via code filter)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "services", "secrets", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps — admin whitelist (blue-y-admin-users) + config (blue-y-config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Allow restart and scale (patch deployments + scale subresource)
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["patch", "update"]
  # HPA monitoring
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # Pod metrics (CPU/memory usage via metrics-server)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blue-y-readonly-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blue-y-readonly
subjects:
  - kind: ServiceAccount
    name: blue-y
    namespace: <namespace>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: <namespace>
  name: blue-y-<tag>
  labels:
    app: "blue-y"
    version: "<tag>"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "blue-y"
      version: "<tag>"
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: "blue-y"
        version: "<tag>"
    spec:
      serviceAccountName: blue-y
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      securityContext:
        fsGroup: 1001   # ensures /data PVC is writable by bluey user (uid 1001)
      containers:
        - image: <ECR>:<tag>-<HASH>
          name: blue-y
          imagePullPolicy: Always
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PORT
              value: "8000"
            - name: AI_BASE_URL
              value: "https://api.deepseek.com/v1"
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: deepseek-api-key
            - name: AI_ROUTINE_MODEL
              value: "deepseek-chat"
            - name: AI_INCIDENT_MODEL
              value: "deepseek-reasoner"
            - name: WATCH_NAMESPACES
              value: "<WATCH_NAMESPACES>"
            - name: KUBE_IN_CLUSTER
              value: "true"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: telegram-bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: telegram-chat-id
            - name: TEAMS_APP_ID
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: teams-app-id
                  optional: true
            - name: TEAMS_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: teams-app-password
                  optional: true
            - name: TEAMS_TENANT_ID
              value: "<TEAMS_TENANT_ID>"   # Set TEAMS_TENANT_ID as a Bitbucket repo variable
            - name: JIRA_BASE_URL
              value: "https://your-org.atlassian.net"
            - name: JIRA_PROJECT_KEY
              value: "OPS"
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: jira-email
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: jira-api-token
            - name: VISION_API_BASE_URL
              value: "https://generativelanguage.googleapis.com/v1beta/openai"
            - name: VISION_MODEL
              value: "gemini-2.0-flash"
            - name: VISION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: vision-api-key
                  optional: true
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: DB_READONLY_USER
              value: "bluey_readonly"
            - name: DB_READONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: db-readonly-password
            - name: BB_USER
              value: ""   # Your Bitbucket username (for pipeline triggers)
            - name: BB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: bitbucket-token
                  optional: true
            - name: GRAFANA_INTERNAL_URL
              value: "http://grafana.monitoring.svc.cluster.local:3000"
            - name: GRAFANA_ADMIN_USER
              value: "admin"
            - name: GRAFANA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: grafana-admin-password
                  optional: true
            - name: SCHEDULE_DAILY_REPORT
              value: "0 9 * * *"
            - name: PRODUCTION_URLS
              value: "<PRODUCTION_URLS>"
            - name: PING_SERVICE_MAP
              value: "<PING_SERVICE_MAP>"
            # --- Admin dashboard (premium) ---
            - name: ADMIN_ENABLED
              value: "true"
            - name: ADMIN_HOST
              value: "https://blue-y.blueonion.today"
            - name: ADMIN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blue-y-secrets
                  key: admin-jwt-secret
            - name: ADMIN_DB_PATH
              value: "/data/blue-y-incidents.sqlite"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: blue-y-data
              mountPath: /data
      volumes:
        - name: blue-y-data
          persistentVolumeClaim:
            claimName: blue-y-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  namespace: <namespace>
  name: blue-y-<tag>
spec:
  type: ClusterIP
  selector:
    app: "blue-y"
    version: "<tag>"
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: <namespace>
  name: blue-y-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: <namespace>
  name: blue-y-admin-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: prod-unified-lb
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-southeast-1:716156543026:certificate/12551248-0d1f-4046-9b82-67a197b2f067,arn:aws:acm:ap-southeast-1:716156543026:certificate/373d33f7-0a20-4519-acea-3832ff46baa3,arn:aws:acm:ap-southeast-1:716156543026:certificate/04ee5a85-91d2-405a-b82c-6648e1a97e37"
spec:
  rules:
    - host: blue-y.blueonion.today
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: blue-y-<tag>
                port:
                  number: 80
