name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: blue-y:ci
          build-args: |
            BUILD_VERSION=ci
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout vulnerability scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: blue-y:ci
          only-severities: critical,high
          exit-code: true
        continue-on-error: true  # warn but don't block on Scout findings

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [build, secret-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write  # required for cosign keyless signing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push to GHCR
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bluey-ai/blue.y:latest
            ghcr.io/bluey-ai/blue.y:${{ github.ref_name }}
            ghcr.io/bluey-ai/blue.y:${{ steps.version.outputs.value }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.value }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.run_started_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless / Sigstore)
        run: |
          cosign sign --yes ghcr.io/bluey-ai/blue.y@${{ steps.build-push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/bluey-ai/blue.y:${{ steps.version.outputs.value }}
          format: spdx-json
          output-file: sbom-${{ steps.version.outputs.value }}.spdx.json

      - name: Upload SBOM as release asset
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.version.outputs.value }}
          path: sbom-${{ steps.version.outputs.value }}.spdx.json
          retention-days: 90
