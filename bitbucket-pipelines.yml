clone:
  depth: 1
options:
  docker: true
  max-time: 15

definitions:
  services:
    docker:
      memory: 3072

  scripts:
    deploy: &deploy |
      set -euo pipefail

      # 1. AUTHENTICATE WITH AWS (OIDC)
      # Set AWS_ACCOUNT_ID, AWS_REGION, and CLUSTERNAME in Bitbucket repo variables
      export AWS_WEB_IDENTITY_TOKEN_FILE=$(pwd)/web-identity-token
      echo $BITBUCKET_STEP_OIDC_TOKEN > $(pwd)/web-identity-token
      export AWS_ROLE_ARN=arn:aws:iam::${AWS_ACCOUNT_ID}:role/BitbucketPipelineRole
      # AWS_REGION is set via Bitbucket repo variable

      # 2. LOGIN TO ECR & UPDATE KUBECONFIG
      aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      aws eks update-kubeconfig --region $AWS_REGION --name ${CLUSTERNAME}

      # 3. DEFINE VARIABLES
      appname="blue-y"
      ECR=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/blue.y
      BUILD_VERSION=$(grep '"version"' package.json | head -1 | awk -F'"' '{print $4}')
      BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      SHORT_COMMIT=${BITBUCKET_COMMIT:0:8}

      echo "Deploying BLUE.Y v${BUILD_VERSION} (${SHORT_COMMIT}) to $ENV..."

      # 4. BUILD & PUSH IMAGE (premium — includes admin module, better-sqlite3)
      docker build -f Dockerfile.premium \
        --no-cache \
        --build-arg BUILD_VERSION=${BUILD_VERSION} \
        --build-arg BUILD_COMMIT=${BITBUCKET_COMMIT} \
        --build-arg BUILD_DATE=${BUILD_DATE} \
        --build-arg BUILD_EDITION=premium \
        -t ${ECR}:${TAG}-${BITBUCKET_COMMIT} \
        -t ${ECR}:${TAG}-v${BUILD_VERSION} \
        -t ${ECR}:${TAG}-latest .

      docker push ${ECR}:${TAG}-${BITBUCKET_COMMIT}
      docker push ${ECR}:${TAG}-v${BUILD_VERSION}
      docker push ${ECR}:${TAG}-latest

      # 5. GENERATE DEPLOYMENT YAML
      cat deploy/deployment_"${TAG}".yaml | \
        sed -e "s/<namespace>/${NAMESPACE}/g" | \
        sed -e "s/<appname>/${appname}/g" | \
        sed -e "s/<tag>/${TAG}/g" | \
        sed -e "s/<HASH>/${BITBUCKET_COMMIT}/g" | \
        sed -e "s#<ECR>#${ECR}#g" | \
        sed -e "s/<ACCOUNT_ID>/${AWS_ACCOUNT_ID}/g" | \
        sed -e "s/<TEAMS_TENANT_ID>/${TEAMS_TENANT_ID:-}/g" | \
        sed -e "s/<WATCH_NAMESPACES>/${WATCH_NAMESPACES:-default,monitoring}/g" | \
        sed -e "s|<PRODUCTION_URLS>|${PRODUCTION_URLS:-}|g" | \
        sed -e "s|<PING_SERVICE_MAP>|${PING_SERVICE_MAP:-}|g" > deployment.yaml

      # 6. APPLY & VERIFY
      kubectl apply -f deployment.yaml
      kubectl get svc --namespace ${NAMESPACE} | grep blue-y

      echo "BLUE.Y v${BUILD_VERSION} (${SHORT_COMMIT}) deployed successfully."

pipelines:
  branches:
    main:
      - step:
          name: 'Deploying Production'
          deployment: Production
          oidc: true
          image:
            # BlueOnion internal build image (aws-cli + kubectl + node22).
            # This file stays private (Bitbucket). Community releases use GitHub Actions instead.
            name: 716156543026.dkr.ecr.ap-southeast-1.amazonaws.com/backend-build-environment:latest
            aws:
              oidc-role: arn:aws:iam::716156543026:role/BitbucketPipelineRole
          services: [docker]
          caches: [docker]
          script:
            - export ENV=prod
            - export TAG=production
            # CLUSTERNAME and NAMESPACE must be set as Bitbucket repo variables
            - *deploy
