apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "blue-y.fullname" . }}-readonly-binding
  labels:
    {{- include "blue-y.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "blue-y.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "blue-y.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
