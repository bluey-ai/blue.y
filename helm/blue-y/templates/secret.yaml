{{- if not .Values.existingSecret.name -}}
{{/*
Chart-managed secret. Only created when existingSecret.name is NOT set.
Values are base64-encoded by Helm automatically via the `secret` type.
Never commit real values — use --set-string or a values override file.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "blue-y.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "blue-y.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.ai.apiKey }}
  ai-api-key: {{ .Values.ai.apiKey | quote }}
  {{- end }}
  {{- if .Values.telegram.botToken }}
  telegram-bot-token: {{ .Values.telegram.botToken | quote }}
  {{- end }}
  {{- if .Values.telegram.chatId }}
  telegram-chat-id: {{ .Values.telegram.chatId | quote }}
  {{- end }}
  {{- if .Values.slack.botToken }}
  slack-bot-token: {{ .Values.slack.botToken | quote }}
  {{- end }}
  {{- if .Values.slack.appToken }}
  slack-app-token: {{ .Values.slack.appToken | quote }}
  {{- end }}
  {{- if .Values.teams.appId }}
  teams-app-id: {{ .Values.teams.appId | quote }}
  {{- end }}
  {{- if .Values.teams.appPassword }}
  teams-app-password: {{ .Values.teams.appPassword | quote }}
  {{- end }}
  {{- if .Values.jira.email }}
  jira-email: {{ .Values.jira.email | quote }}
  {{- end }}
  {{- if .Values.jira.apiToken }}
  jira-api-token: {{ .Values.jira.apiToken | quote }}
  {{- end }}
  {{- if .Values.vision.apiKey }}
  vision-api-key: {{ .Values.vision.apiKey | quote }}
  {{- end }}
  {{- if .Values.database.readonlyPassword }}
  db-readonly-password: {{ .Values.database.readonlyPassword | quote }}
  {{- end }}
  {{- if .Values.bitbucket.token }}
  bitbucket-token: {{ .Values.bitbucket.token | quote }}
  {{- end }}
  {{- if .Values.grafana.adminPassword }}
  grafana-admin-password: {{ .Values.grafana.adminPassword | quote }}
  {{- end }}
  {{- if .Values.email.smtp.user }}
  smtp-user: {{ .Values.email.smtp.user | quote }}
  smtp-pass: {{ .Values.email.smtp.pass | quote }}
  {{- end }}
{{- end }}
