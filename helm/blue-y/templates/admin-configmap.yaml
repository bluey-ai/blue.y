{{- if .Values.admin.enabled }}
# ConfigMap blue-y-admin-users — admin whitelist for magic-link auth.
# Format for each entry: "platform:userId:Display Name"
# Platforms: telegram, slack, teams, whatsapp
#
# Example — add users after install:
#   kubectl patch configmap blue-y-admin-users -n <namespace> \
#     --type merge -p '{"data":{"user1":"telegram:123456789:Jane Doe"}}'
#
# The bot polls this ConfigMap every 30s — no pod restart needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-y-admin-users
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "blue-y.labels" . | nindent 4 }}
data: {}
---
# Secret blue-y-admin-jwt — HS256 signing key for magic links and session tokens.
# Auto-populated by Helm if admin.jwtSecret is set; otherwise generate manually:
#   kubectl create secret generic blue-y-admin-jwt -n <namespace> \
#     --from-literal=jwt-secret=$(openssl rand -hex 32)
apiVersion: v1
kind: Secret
metadata:
  name: blue-y-admin-jwt
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "blue-y.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ required "admin.jwtSecret must be set (use: openssl rand -hex 32)" .Values.admin.jwtSecret | quote }}
{{- end }}
