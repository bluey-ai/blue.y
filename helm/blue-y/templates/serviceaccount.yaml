{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "blue-y.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "blue-y.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.irsaRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.irsaRoleArn | quote }}
  {{- end }}
{{- end }}
