apiVersion: v1
kind: Service
metadata:
  name: {{ include "blue-y.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "blue-y.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "blue-y.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
