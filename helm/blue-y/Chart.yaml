apiVersion: v2
name: blue-y
description: >
  BLUE.Y — AI ops assistant for 24/7 Kubernetes cluster monitoring.
  Monitors pods, nodes, certs, HPA, and load. Sends alerts via Telegram,
  Slack, or Teams. Runs kubectl actions (restart, scale) via chat commands.
  Integrates with Jira, Grafana, Loki, AWS (Bedrock, WAF, SES, RDS, Glue).

type: application
version: 1.4.0
appVersion: "1.4.0"

home: https://github.com/bluey-ai/blue.y
sources:
  - https://github.com/bluey-ai/blue.y

icon: https://raw.githubusercontent.com/bluey-ai/blue.y/main/assets/blue-y.svg

maintainers:
  - name: BlueOnion
    email: hello@bluey.ai
    url: https://github.com/bluey-ai

keywords:
  - kubernetes
  - monitoring
  - ai
  - ops
  - telegram
  - slack
  - devops

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/signKey: |
    fingerprint: ""
    url: ""
  artifacthub.io/changes: |
    - kind: added
      description: Graceful SIGTERM/SIGINT shutdown handler
    - kind: added
      description: docker-compose.yml for local development
    - kind: added
      description: SVG vector logo (assets/blue-y.svg)
    - kind: added
      description: Bitbucket PR template
