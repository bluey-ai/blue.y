apiVersion: v2
name: blue-y
description: >
  BLUE.Y — AI ops assistant for 24/7 Kubernetes cluster monitoring.
  Monitors pods, nodes, certs, HPA, and load. Sends alerts via Telegram,
  Slack, or Teams. Runs kubectl actions (restart, scale) via chat commands.
  Integrates with Jira, Grafana, Loki, AWS (Bedrock, WAF, SES, RDS, Glue).

type: application
version: 1.2.0
appVersion: "1.2.0"

home: https://github.com/blue-onion/blue.y
sources:
  - https://github.com/blue-onion/blue.y

maintainers:
  - name: BlueOnion
    url: https://blueonion.today

keywords:
  - kubernetes
  - monitoring
  - ai
  - ops
  - telegram
  - slack
  - devops
