apiVersion: v2
name: blue-y
description: >
  BLUE.Y — AI ops assistant for 24/7 Kubernetes cluster monitoring.
  Monitors pods, nodes, certs, HPA, and load. Sends alerts via Telegram,
  Slack, or Teams. Runs kubectl actions (restart, scale) via chat commands.
  Integrates with Jira, Grafana, Loki, AWS (Bedrock, WAF, SES, RDS, Glue).

type: application
version: 1.8.0
appVersion: "1.8.0"

home: https://github.com/bluey-ai/blue.y
sources:
  - https://github.com/bluey-ai/blue.y

icon: https://raw.githubusercontent.com/bluey-ai/blue.y/main/assets/blue-y.svg

maintainers:
  - name: BlueOnion
    email: syedzac@icloud.com
    url: https://github.com/bluey-ai

keywords:
  - kubernetes
  - monitoring
  - ai
  - ops
  - telegram
  - slack
  - devops

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/signKey: |
    fingerprint: ""
    url: ""
  artifacthub.io/changes: |
    - kind: security
      description: "Prompt injection mitigation: sanitizeForAI() applied to all cluster data before AI API calls"
    - kind: security
      description: Hardened system prompt with absolute anti-injection security constraint
    - kind: security
      description: "Container securityContext: readOnlyRootFilesystem, runAsNonRoot, drop all capabilities"
    - kind: added
      description: SMTP email support — works on GKE, AKS, bare metal (no AWS SES required)
    - kind: added
      description: Auto-detects transport — SMTP when SMTP_HOST is set, SES otherwise
    - kind: changed
      description: email.from replaces emailFrom in values.yaml (smtp block added)
